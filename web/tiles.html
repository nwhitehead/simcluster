<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Grid</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
    line-height: 1.6;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    color: #f0f6fc;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-bottom: 1.2rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.2rem;
  }

  .controls .label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-right: 0.3rem;
  }

  button {
    font-family: inherit;
    font-size: 0.85rem;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.35rem 0.75rem;
    cursor: pointer;
    transition: background 120ms, border-color 120ms, color 120ms;
  }

  button:hover {
    border-color: var(--accent);
    color: #f0f6fc;
  }

  button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 700;
  }

  .spacer { flex: 1; }

  #reshuffle {
    border-color: var(--accent);
    color: var(--accent);
  }

  #grid {
    display: grid;
    gap: 0;
    width: 100%;
    aspect-ratio: 282 / 270;
  }

  .tile {
    background-image: url('TLhoriz.png');
    /* Image is 1920x283. Each tile is 282x270; first tile upper-left at (28, 6).
       bg width  = 1920/282 of the cell = 680.851%.
       bg height = 283/270  of the cell = 104.815%.
       Tiny overshoot (cell+1px) avoids sub-pixel seams between adjacent tiles. */
    background-size: calc(680.851% + 15px) calc(104.815% + 10px);
    background-repeat: no-repeat;
    aspect-ratio: 282 / 270;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Tile Grid</h1>
    <p class="subtitle">Each cell is one of the 5 tiles from TLhoriz.png, chosen at random.</p>

    <div class="controls">
      <span class="label">Size:</span>
      <button data-n="5">5×5</button>
      <button data-n="9">9×9</button>
      <button data-n="15" class="active">15×15</button>
      <button data-n="21">21×21</button>
      <button data-n="49">49×49</button>
      <span class="spacer"></span>
      <button id="reshuffle">Reshuffle</button>
    </div>

    <div id="grid"></div>
  </div>

<script>
  // TLhoriz.png: 1920x283. Five 282x270 tiles; first tile upper-left at (28, 6).
  // Other tiles are the same size, spaced to the right with transparent gaps:
  const TILE_OFFSETS = [28, 423, 818, 1214, 1609];
  const TILE_COUNT = TILE_OFFSETS.length;
  const IMG_WIDTH = 1920;
  const IMG_HEIGHT = 283;
  const TILE_W = 282;
  const TILE_H = 270;
  const TILE_Y = 6;
  // background-position percentage = offset / (image - tile)
  const TILE_POS_X = TILE_OFFSETS.map(x => (x * 100) / (IMG_WIDTH - TILE_W));
  const TILE_POS_Y = (TILE_Y * 100) / (IMG_HEIGHT - TILE_H);

  const grid = document.getElementById('grid');
  const reshuffleBtn = document.getElementById('reshuffle');
  let currentN = 15;

  function render(n) {
    currentN = n;
    grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${n}, 1fr)`;
    const cells = n * n;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < cells; i++) {
      const tile = Math.floor(Math.random() * TILE_COUNT);
      const div = document.createElement('div');
      div.className = 'tile';
      div.style.backgroundPosition = `${TILE_POS_X[tile]}% ${TILE_POS_Y}%`;
      frag.appendChild(div);
    }
    grid.replaceChildren(frag);
  }

  document.querySelectorAll('button[data-n]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('button[data-n]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(parseInt(btn.dataset.n, 10));
    });
  });

  reshuffleBtn.addEventListener('click', () => render(currentN));

  render(currentN);
</script>
</body>
</html>
